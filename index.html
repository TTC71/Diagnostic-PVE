<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Diag ERP">
<meta name="theme-color" content="#0F1923">
<title>Diagnostic ERP</title>
<style>
:root{--ink:#0F1923;--ink2:#1E2D3D;--ink3:#2E4260;--sky:#98C1D9;--paper:#F4F8FB;--white:#FFFFFF;--ok:#1A7A4A;--ok-bg:#E8F5EE;--warn:#B45309;--warn-bg:#FEF3C7;--danger:#B91C1C;--danger-bg:#FEE2E2;--accent:#0066CC;--r:10px;--rs:6px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--ink);font-family:'SF Pro Text','Helvetica Neue',Arial,sans-serif}
#shell{display:flex;flex-direction:column;height:100%;background:var(--paper)}
#topbar{background:var(--ink);flex-shrink:0;padding:env(safe-area-inset-top,14px) 16px 0}
#topbar-inner{display:flex;align-items:center;gap:10px;padding-bottom:12px;border-bottom:1px solid var(--ink2)}
#tlogo{width:32px;height:32px;border-radius:8px;background:var(--ink3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
#ttitle{flex:1;min-width:0}
#ttitle h1{font-size:15px;font-weight:600;color:#fff}
#ttitle p{font-size:11px;color:var(--sky);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ibtn{width:34px;height:34px;border-radius:8px;border:1px solid var(--ink3);background:transparent;color:var(--sky);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;font-family:inherit}
.ibtn:active{background:var(--ink2)}
#nav{display:flex;background:var(--ink);padding:0 8px 8px;gap:4px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
#nav::-webkit-scrollbar{display:none}
.ntab{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--ink3);background:transparent;color:var(--sky);cursor:pointer;white-space:nowrap;font-family:inherit}
.ntab.active{background:#fff;color:var(--ink);border-color:#fff}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
/* ── iPad responsive ── */
@media(min-width:768px){
  #shell{flex-direction:row;flex-wrap:nowrap}
  #topbar{display:none}
  #sidebar{
    width:220px;flex-shrink:0;
    background:var(--ink);
    display:flex;flex-direction:column;
    padding:env(safe-area-inset-top,20px) 0 env(safe-area-inset-bottom,20px);
    overflow-y:auto;
  }
  #sidebar-top{padding:16px 16px 12px;border-bottom:1px solid var(--ink2);margin-bottom:8px}
  #sidebar-logo{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  #sidebar-logo .slogo{width:32px;height:32px;border-radius:8px;background:var(--ink3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  #sidebar-logo h1{font-size:14px;font-weight:600;color:#fff}
  #sidebar-sub{font-size:11px;color:var(--sky);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #sidebar-actions{display:flex;gap:6px;margin-top:10px}
  #nav{
    flex-direction:column;
    padding:4px 10px;
    gap:2px;
    overflow-x:visible;
    overflow-y:auto;
    flex:1;
  }
  .ntab{
    width:100%;text-align:left;
    padding:9px 12px;border-radius:8px;
    font-size:13px;
    border-color:transparent;
    background:transparent;
    color:var(--sky);
  }
  .ntab.active{background:rgba(255,255,255,.12);color:#fff;border-color:transparent}
  .ntab:hover:not(.active){background:rgba(255,255,255,.07)}
  #sidebar-bottom{padding:12px 16px;border-top:1px solid var(--ink2);margin-top:auto}
  #content{flex:1;min-width:0}
  /* Largeur des cartes en mode iPad */
  .card,.stats-bar,.piece-card,.cfg-sec,.exp-card{margin-left:20px;margin-right:20px}
  .card+.card,.piece-card,.cfg-sec,.sec-block{margin-top:12px}
  .piece-picker{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  .bib-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))}
  .pfield-row{gap:16px}
}
/* Bandeau installation */
#install-banner{
  display:none;
  background:var(--accent);color:#fff;
  padding:10px 16px;font-size:12px;
  align-items:center;gap:10px;flex-shrink:0;
  cursor:pointer;
}
#install-banner.show{display:flex}
#install-banner strong{flex:1}
#install-banner .ib-close{opacity:.7;font-size:16px;cursor:pointer;padding:4px}
.card{background:#fff;border:1px solid #DDE6EE;border-radius:var(--r);margin:12px 12px 0;overflow:hidden}
.form-row{display:flex;flex-direction:column;gap:4px;padding:11px 14px;border-bottom:1px solid #F0F4F8}
.form-row:last-child{border-bottom:none}
.form-row label{font-size:11px;font-weight:600;color:#8899AA;text-transform:uppercase;letter-spacing:.05em}
.form-row input,.form-row select,.form-row textarea{font-size:14px;border:none;background:transparent;color:var(--ink);font-family:inherit;width:100%;-webkit-appearance:none;outline:none}
.form-row textarea{resize:none;height:72px;line-height:1.5}
.stats-bar{display:flex;background:#fff;border:1px solid #DDE6EE;border-radius:var(--r);overflow:hidden;margin:12px 12px 0}
.sc{flex:1;padding:10px 6px;text-align:center;border-right:1px solid #EEF3F8}
.sc:last-child{border-right:none}
.sc-n{font-size:18px;font-weight:700;color:var(--ink)}
.sc-l{font-size:9px;color:#8899AA;margin-top:3px;text-transform:uppercase;letter-spacing:.04em}
.btn{padding:11px 14px;border-radius:var(--rs);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:none;display:inline-block}
.btn-p{background:var(--ink);color:#fff}.btn-p:active{background:var(--ink2)}
.btn-s{background:var(--paper);color:var(--ink);border:1px solid #DDE6EE}.btn-s:active{background:#E8ECF0}
.del-b{width:24px;height:24px;border-radius:50%;border:1px solid #DDE6EE;background:transparent;color:#AABBCC;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;padding:0}
.del-b:active{background:var(--danger-bg);color:var(--danger)}
.tag{font-size:11px;padding:2px 9px;border-radius:10px;font-weight:600;display:inline-block}
.tok{background:var(--ok-bg);color:var(--ok)}.twarn{background:var(--warn-bg);color:var(--warn)}
.tdanger{background:var(--danger-bg);color:var(--danger)}.tinfo{background:#E6F0FF;color:#1044AA}
.add-row{display:flex;align-items:center;gap:7px;width:100%;padding:10px 14px;background:transparent;border:none;font-size:13px;color:var(--accent);font-family:inherit;cursor:pointer;border-top:1px solid #F0F4F8;text-align:left}
.add-row:active{background:#EEF6FF}
.add-row .plus{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:300;flex-shrink:0}
.rrow{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid #F0F4F8}
.rrow:last-child{border-bottom:none}
.rlbl{font-size:12px;font-weight:600;color:#6677AA;width:128px;flex-shrink:0;padding-top:2px}
.rval{font-size:13px;color:var(--ink);flex:1;line-height:1.4}
/* DIAGNOSTIC */
.empty-state{display:flex;flex-direction:column;align-items:center;gap:16px;padding:60px 32px;text-align:center}
.empty-state .big-icon{font-size:56px}
.empty-state h2{font-size:18px;font-weight:600;color:var(--ink)}
.empty-state p{font-size:14px;color:#8899AA;line-height:1.6}
.piece-picker{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:12px}
.piece-opt{background:#fff;border:1.5px solid #DDE6EE;border-radius:var(--r);padding:16px 10px;text-align:center;cursor:pointer}
.piece-opt:active{border-color:var(--accent);background:#EEF6FF}
.piece-opt .po-icon{font-size:30px;margin-bottom:8px}
.piece-opt .po-lbl{font-size:13px;font-weight:600;color:var(--ink)}
.piece-card{background:#fff;border:1px solid #DDE6EE;border-radius:var(--r);margin:10px 12px 0;overflow:hidden}
.piece-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.ph-icon{font-size:20px;flex-shrink:0}
.ph-name{flex:1;font-size:14px;font-weight:600;color:var(--ink)}
.ph-surf{font-size:12px;color:#8899AA}
.ph-chev{font-size:11px;color:#8899AA;transition:transform .2s;flex-shrink:0}
.ph-chev.open{transform:rotate(180deg)}
.piece-body{border-top:1px solid #EEF3F8;display:none}
.piece-body.open{display:block}
.piece-deleted .piece-head{opacity:.5}
.piece-deleted .piece-body{display:none!important}
.psec{border-bottom:1px solid #EEF3F8}
.psec:last-child{border-bottom:none}
.psec-head{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;user-select:none}
.psh-icon{font-size:14px;flex-shrink:0}
.psh-title{flex:1;font-size:13px;font-weight:600;color:var(--ink)}
.psec-body{padding:4px 14px 10px;display:none}
.psec-body.open{display:block}
.pfield{display:flex;flex-direction:column;gap:4px;padding:8px 0;border-bottom:1px solid #F4F6F8}
.pfield:last-child{border-bottom:none}
.pfield label{font-size:11px;font-weight:600;color:#8899AA;text-transform:uppercase;letter-spacing:.04em}
.pfield input,.pfield select,.pfield textarea{font-size:13px;padding:7px 9px;border:1px solid #DDE6EE;border-radius:var(--rs);background:var(--paper);color:var(--ink);font-family:inherit;-webkit-appearance:none;width:100%}
.pfield input:focus,.pfield select:focus,.pfield textarea:focus{outline:none;border-color:var(--accent)}
.pfield textarea{height:64px;resize:none;line-height:1.5}
.pfield-row{display:flex;gap:8px}
.pfield-row .pfield{flex:1}
/* PLAN */
.plan-drop{display:flex;flex-direction:column;align-items:center;gap:14px;padding:50px 24px;cursor:pointer;border:2px dashed #C8D8E8;border-radius:var(--r);margin:12px;background:var(--paper);text-align:center}
.plan-tabs{display:flex;align-items:center;gap:6px;padding:8px 12px;background:#fff;border-bottom:1px solid #EEF3F8;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.plan-tabs::-webkit-scrollbar{display:none}
.plan-tab{flex-shrink:0;padding:5px 14px;border-radius:16px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid #DDE6EE;background:var(--paper);color:var(--ink)}
.plan-tab.active{border-color:var(--accent);background:var(--accent);color:#fff}
.pcat-bar{display:flex;gap:6px;padding:10px 12px;background:#fff;border-bottom:1px solid #EEF3F8;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.pcat-bar::-webkit-scrollbar{display:none}
.pcb{flex-shrink:0;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;border:1.5px solid #DDE6EE;background:var(--paper);color:#6677AA}
.peq-bar{display:flex;gap:8px;padding:10px 12px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;border-bottom:1px solid #EEF3F8;background:#FAFBFC;min-height:86px;align-items:center}
.peq-bar::-webkit-scrollbar{display:none}
.peq{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 6px;border-radius:var(--r);cursor:pointer;flex-shrink:0;min-width:64px;text-align:center;border:1.5px solid #DDE6EE;background:#fff}
.peq.sel{border-width:2px}
.peq-em{font-size:26px;line-height:1}
.peq-lb{font-size:10px;font-weight:600;color:var(--ink);max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#plan-scroll{overflow:auto;-webkit-overflow-scrolling:touch;background:#E8EDF2;position:relative}
#plan-cw{position:relative;display:inline-block;min-width:100%;touch-action:none}
#plan-cw img{display:block;width:100%;height:auto;pointer-events:none;user-select:none;-webkit-user-select:none}
.mkpin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;display:flex;flex-direction:column;align-items:center;filter:drop-shadow(0 2px 5px rgba(0,0,0,.4))}
.mkbub{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:3px solid;box-shadow:0 0 0 2px #fff}
.plan-acts{display:flex;gap:6px;padding:8px 12px;border-top:1px solid #EEF3F8;flex-wrap:wrap;background:#fff;align-items:center}
.pact{flex:1;min-width:60px;padding:8px 6px;border-radius:var(--rs);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid #DDE6EE;background:var(--paper);color:var(--ink);white-space:nowrap;text-align:center}
.pact:active{background:#E8ECF0}
.pact.active-mode{background:var(--accent);color:#fff;border-color:var(--accent)}
.pact.red{color:var(--danger);border-color:#FECACA}
.pact.red:active{background:var(--danger-bg)}
.plan-hint{font-size:12px;color:#8899AA;padding:7px 12px;text-align:center;border-top:1px solid #EEF3F8;transition:background .2s}
.mklist-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #F0F4F8}
.mklist-item:last-child{border-bottom:none}
/* BIBLIO */
.bib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:8px}
.bib-card{background:#fff;border:1.5px solid #DDE6EE;border-radius:var(--r);padding:10px 4px 8px;text-align:center;position:relative}
.bib-em{font-size:26px;line-height:1;margin-bottom:5px}
.bib-lb{font-size:10px;font-weight:600;color:var(--ink);line-height:1.3;padding:0 2px}
/* CONFIG */
.cfg-sec{background:#fff;border:1px solid #DDE6EE;border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.cfg-sec-head{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#FAFBFC;border-bottom:1px solid #EEF3F8}
.cfg-field-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid #F4F6F8}
.cfg-field-row:last-child{border-bottom:none}
/* MODALS */
.mback{position:fixed;inset:0;background:rgba(15,25,35,.55);display:none;align-items:flex-end;justify-content:center;z-index:200}
.mback.show{display:flex}
.mbox{width:100%;max-width:640px;background:#fff;border-radius:var(--r) var(--r) 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom,0px));max-height:88vh;overflow-y:auto}
.mbox h3{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:16px}
.mf{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.mf label{font-size:11px;font-weight:600;color:#8899AA;text-transform:uppercase;letter-spacing:.05em}
.mf input,.mf select,.mf textarea{font-size:14px;padding:9px 11px;border:1px solid #DDE6EE;border-radius:var(--rs);background:var(--paper);color:var(--ink);font-family:inherit;-webkit-appearance:none;width:100%}
.mf input:focus,.mf textarea:focus{outline:none;border-color:var(--accent)}
.mf textarea{height:80px;resize:none;line-height:1.5}
.macts{display:flex;gap:8px;margin-top:4px}
.macts button{flex:1;padding:12px;border-radius:var(--rs);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;border:none}
.mbok{background:var(--ink);color:#fff}.mbok:active{background:var(--ink2)}
.mbcancel{background:var(--paper);color:#8899AA;border:1px solid #DDE6EE!important}
.egrid{display:flex;flex-wrap:wrap;gap:6px}
.eopt{width:40px;height:40px;border-radius:8px;border:1.5px solid #DDE6EE;background:var(--paper);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer}
.eopt.sel{border-color:var(--accent);background:#EEF6FF;border-width:2px}
.proj-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #F0F4F8;cursor:pointer}
.proj-row:last-child{border-bottom:none}
.mclosebtn{width:100%;padding:12px;border-radius:var(--rs);background:var(--paper);border:1px solid #DDE6EE;font-size:14px;font-weight:600;color:#8899AA;font-family:inherit;cursor:pointer;margin-top:12px}
.csv-pre{width:100%;height:120px;font-size:10px;font-family:monospace;padding:8px;border-radius:var(--rs);border:1px solid #DDE6EE;background:var(--paper);color:#4455AA;resize:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes menuPop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.mk-ctx-menu button:active{background:#F4F8FB!important}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,16px) + 16px);left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;pointer-events:none;transition:transform .25s,opacity .25s;opacity:0;z-index:300;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── PLAN V2 : canvas natif ── */
#plan-wrap{position:relative;flex:1;min-height:200px;overflow:hidden;background:#E8EDF2;touch-action:none;cursor:grab}
#plan-canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block}
.plan-hint{font-size:12px;color:#8899AA;padding:6px 12px;text-align:center;border-top:1px solid #EEF3F8}
.pact{flex:1;min-width:60px;padding:8px 6px;border-radius:var(--rs);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid #DDE6EE;background:var(--paper);color:var(--ink);white-space:nowrap;text-align:center}
.pact:active{background:#E8ECF0}
.pact.red{color:var(--danger);border-color:#FECACA}
#reposition-banner{display:none;position:fixed;top:0;left:0;right:0;z-index:401;background:var(--accent);color:#fff;padding:14px 16px;align-items:center;justify-content:space-between;font-size:14px;font-weight:600;font-family:inherit;box-shadow:0 2px 12px rgba(0,0,0,.3)}
#reposition-banner.show{display:flex}
@keyframes menuPop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.mk-ctx-menu button:active{background:#F4F8FB!important}

</style>
</head>
<body>
<div id="shell">
  <div id="topbar"><div id="topbar-inner">
    <div id="tlogo">📋</div>
    <div id="ttitle"><h1>Diagnostic ERP</h1><p id="tsub">Nouveau projet</p></div>
    <div style="display:flex;gap:6px;flex-shrink:0">
      <button class="ibtn" onclick="openProjModal()">📁</button>
      <button class="ibtn" onclick="newProject()">＋</button>
    </div>
  </div></div>
  <!-- Bandeau installation app -->
  <div id="install-banner">
    <strong>📱 Installer l'app sur l'écran d'accueil</strong>
    <span>Safari → Partager → "Sur l'écran d'accueil"</span>
    <span class="ib-close" onclick="document.getElementById('install-banner').classList.remove('show');localStorage.setItem('ib_dismissed','1')">✕</span>
  </div>
  <!-- Sidebar iPad (visible ≥768px) -->
  <div id="sidebar">
    <div id="sidebar-top">
      <div id="sidebar-logo">
        <div class="slogo">📋</div>
        <h1>Diagnostic ERP</h1>
      </div>
      <div id="sidebar-sub">Nouveau projet</div>
      <div id="sidebar-actions">
        <button class="ibtn" onclick="openProjModal()">📁</button>
        <button class="ibtn" onclick="newProject()">＋</button>
      </div>
    </div>
    <div id="nav">
      <button class="ntab active" data-tab="identification">📋 Projet</button>
      <button class="ntab" data-tab="diagnostic">🏗 Diagnostic</button>
      <button class="ntab" data-tab="risques">⚠️ Risques</button>
      <button class="ntab" data-tab="reglementation">⚖️ Réglementation</button>
      <button class="ntab" data-tab="plan">🗺 Plan</button>
      <button class="ntab" data-tab="biblio">🔧 Équipements</button>
      <button class="ntab" data-tab="config">⚙️ Config</button>
      <button class="ntab" data-tab="export">📤 Export CSV</button>
    </div>
    <div id="sidebar-bottom">
      <div style="font-size:10px;color:var(--sky);opacity:.6">v10h · Diagnostic ERP</div>
    </div>
  </div>
  <div id="content"></div>
</div>

<!-- MODAL PROJETS -->
<div class="mback" id="m-proj"><div class="mbox">
  <h3>Mes projets</h3><div id="proj-list"></div>
  <button class="mclosebtn" onclick="closeM('m-proj')">Fermer</button>
</div></div>

<!-- MODAL MARQUEUR PLAN -->
<div class="mback" id="m-mk"><div class="mbox">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
    <div id="m-mk-em" style="font-size:36px"></div>
    <div><div id="m-mk-lbl" style="font-size:15px;font-weight:700;color:var(--ink)"></div>
    <div id="m-mk-cat" style="font-size:11px;color:#8899AA;margin-top:1px"></div></div>
  </div>
  <div class="mf"><label>Note / observation</label>

let projects=[], currentId=null, currentTab='identification';

function uid(){ return 'x'+Date.now()+Math.random().toString(36).slice(2,6); }

function getPSEC(){
  try{
    const d=localStorage.getItem('erp_cfg');
    if(d){const p=JSON.parse(d);if(Array.isArray(p)&&p.length)return p;}
  }catch(e){}
  return PSEC_DEFAULT.map(s=>JSON.parse(JSON.stringify(s)));
}
function savePSEC(cfg){
  try{localStorage.setItem('erp_cfg',JSON.stringify(cfg));}catch(e){}
}

function mkPiece(typeId,customName){
  const pt=PIECE_TYPES.find(p=>p.id===typeId)||PIECE_TYPES[0];
  const data={};
  getPSEC().forEach(s=>{data[s.id]={};(s.fields||[]).forEach(f=>{data[s.id][f.id]='';});});
  return {id:uid(),typeId,icon:pt.icon,
          label:typeId==='custom'?(customName||'Nouvelle pièce'):pt.label,
          data,_deleted:false};
}

function mkProj(){
  return {id:uid(),nom:'',mo:'',adresse:'',
          date:new Date().toISOString().slice(0,10),
          moe:'',phase:'ESQ',activite:'M',regime:'Propriétaire',notes:'',
          pieces:[],risques:[],hsp:'',
          plans:[{id:'p0',label:'RDC',imgSrc:null,markers:[]}],
          currentPlanIdx:0};
}

function sv(){try{localStorage.setItem('erp',JSON.stringify(projects));}catch(e){}}
function svEq(){try{localStorage.setItem('erpeq',JSON.stringify(customEquip));}catch(e){}}

function loadAll(){
  try{const d=localStorage.getItem('erp');if(d)projects=JSON.parse(d);}catch(e){projects=[];}
  if(!projects.length)projects.push(mkProj());
  // Migrer anciens projets sans plans
  projects.forEach(p=>{
    if(!p.plans){
      p.plans=[{id:'p0',label:'RDC',imgSrc:p.planImgSrc||null,markers:p.planMarkers||[]}];
      p.currentPlanIdx=0;
      delete p.planImgSrc; delete p.planMarkers;
    }
    if(p.currentPlanIdx===undefined)p.currentPlanIdx=0;
    if(!p.risques)p.risques=[];
    if(!p.pieces)p.pieces=[];
  });
  currentId=projects[0].id;
  try{const d=localStorage.getItem('erpeq');if(d)customEquip=JSON.parse(d);}catch(e){customEquip=[];}
}

function proj(){return projects.find(p=>p.id===currentId)||projects[0];}
function curPlan(){
  const p=proj();
  const i=Math.min(p.currentPlanIdx||0,p.plans.length-1);
  return p.plans[i];
}
function allEq(){return [...DEFEQUIP,...customEquip];}
function eqById(id){return allEq().find(e=>e.id===id);}

function showTab(tab){
  currentTab=tab;
  document.querySelectorAll('.ntab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  const c=document.getElementById('content');
  c.scrollTop=0; c.innerHTML='';
  c.style.cssText=''; // reset style plan
  if(tab==='identification')renderIdent(c);
  else if(tab==='diagnostic')renderDiag(c);
  else if(tab==='risques')   renderRisques(c);
  else if(tab==='reglementation')renderRegl(c);
  else if(tab==='plan')      renderPlan(c);
  else if(tab==='biblio')    renderBiblio(c);
  else if(tab==='config')    renderConfig(c);
  else if(tab==='export')    renderExport(c);
}
function updateTopbar(){
  const p=proj();
  const sub=(p.nom||'Nouveau projet')+(p.adresse?' · '+p.adresse:'');
  const tsub=document.getElementById('tsub');
  const ssub=document.getElementById('sidebar-sub');
  if(tsub)tsub.textContent=sub;
  if(ssub)ssub.textContent=sub;
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),2400);
}
function openM(id){document.getElementById(id).classList.add('show');}
function closeM(id){document.getElementById(id).classList.remove('show');}

function renderIdent(c){
  const p=proj();
  const sb=document.createElement('div');sb.className='stats-bar';
  const eff=effectif();
  sb.innerHTML=`<div class="sc"><div class="sc-n">${calcSurfs().total.toFixed(0)}</div><div class="sc-l">m² total</div></div><div class="sc"><div class="sc-n">${eff||'—'}</div><div class="sc-l">personnes</div></div><div class="sc"><div class="sc-n">${categorie(eff)}</div><div class="sc-l">catégorie</div></div><div class="sc"><div class="sc-n">${p.pieces.filter(x=>!x._deleted).length}</div><div class="sc-l">pièces</div></div>`;
  c.appendChild(sb);
  const card=document.createElement('div');card.className='card';
  [['Projet','text','nom','Intitulé du projet'],
   ["Maître d'ouvrage",'text','mo','Nom / raison sociale'],
   ['Adresse du site','text','adresse','Rue, code postal, ville'],
   ['Date de visite','date','date',''],
   ["Maître d'œuvre",'text','moe','Votre cabinet'],
  ].forEach(([lbl,type,key,ph])=>{
    const row=document.createElement('div');row.className='form-row';
    row.innerHTML=`<label>${lbl}</label>`;
    const inp=document.createElement('input');inp.type=type;inp.value=p[key]||'';inp.placeholder=ph;
    inp.addEventListener('input',e=>{proj()[key]=e.target.value;sv();updateTopbar();});
    row.appendChild(inp);card.appendChild(row);
  });
  // Phase
  const rp=document.createElement('div');rp.className='form-row';
  rp.innerHTML='<label>Phase</label>';
  const sp=document.createElement('select');
  ['ESQ','APS','APD','PRO','ACT','DET'].forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;if(p.phase===v)o.selected=true;sp.appendChild(o);});
  sp.addEventListener('change',e=>{proj().phase=e.target.value;sv();});
  rp.appendChild(sp);card.appendChild(rp);
  // Activité
  const ra=document.createElement('div');ra.className='form-row';
  ra.innerHTML='<label>Activité future (Type ERP)</label>';
  const sa=document.createElement('select');
  [['M','M — Magasins'],['N','N — Restaurant'],['W','W — Bureaux'],['L','L — Spectacle'],['R','R — Enseignement'],['J','J — Pers. âgées'],['other','Autre']].forEach(([v,l])=>{const o=document.createElement('option');o.value=v;o.textContent=l;if(p.activite===v)o.selected=true;sa.appendChild(o);});

  rr.appendChild(sr);card.appendChild(rr);

  const rn=document.createElement('div');rn.className='form-row';
  rn.innerHTML='<label>Notes libres</label>';

  rn.appendChild(tn);card.appendChild(rn);
  // HSP
  const rh=document.createElement('div');rh.className='form-row';

  ih.addEventListener('input',e=>{proj().hsp=e.target.value;sv();});
  rh.appendChild(ih);card.appendChild(rh);
  c.appendChild(card);
  c.style.paddingBottom='20px';
}

function calcSurfs(){
  let total=0,vente=0;
  const p=proj();
  // Calculer depuis les pièces (champ dims.l et dims.w)
  p.pieces.filter(x=>!x._deleted).forEach((piece,i)=>{
    const d=(piece.data&&piece.data.dims)||{};
    const s=(parseFloat(d.l)||0)*(parseFloat(d.w)||0);
    total+=s;
    if(i===0||piece.typeId==='vente')vente=s;
  });
  return{total:+total.toFixed(2),vente:+vente.toFixed(2)};
}
function effectif(){
  const{vente}=calcSurfs();
  return vente>0?Math.ceil(vente/(ERP_DENSITY[proj().activite]||5)):0;
}
function categorie(eff){
  if(!eff)return'—';
  if(eff>1500)return'Cat. 1';if(eff>700)return'Cat. 2';
  if(eff>300)return'Cat. 3';if(eff>200)return'Cat. 4';
  return'Cat. 5';
}

function makePieceCard(piece,p){
  const block=document.createElement('div');block.className='piece-card';
  if(piece._deleted)block.classList.add('piece-deleted');

  // En-tête
  const head=document.createElement('div');head.className='piece-head';
  const d=(piece.data&&piece.data.dims)||{};
  const surf=(parseFloat(d.l)||0)*(parseFloat(d.w)||0);
  head.innerHTML=`<div class="ph-icon">${piece.icon}</div><div class="ph-name">${piece.label}</div><div class="ph-surf">${surf?surf.toFixed(1)+' m²':''}</div><span class="ph-chev open">▼</span>`;

  const body=document.createElement('div');body.className='piece-body open';

  // Barre outils pièce
  const toolbar=document.createElement('div');
  toolbar.style.cssText='display:flex;align-items:center;gap:6px;padding:8px 14px;border-bottom:1px solid #EEF3F8;background:#FAFBFC';

  const renInp=document.createElement('input');
  renInp.style.cssText='font-size:13px;font-weight:600;color:var(--ink);border:1px solid #DDE6EE;border-radius:var(--rs);padding:5px 8px;flex:1;font-family:inherit;background:var(--paper)';
  renInp.value=piece.label;renInp.placeholder='Nom de la pièce…';
  renInp.addEventListener('input',e=>{piece.label=e.target.value;sv();head.querySelector('.ph-name').textContent=e.target.value;});

  // Dupliquer
  const dupBtn=document.createElement('button');dupBtn.className='del-b';
  dupBtn.style.cssText='color:var(--accent);border-color:#BDD7EE;font-size:16px';
  dupBtn.title='Dupliquer';dupBtn.textContent='⎘';
  dupBtn.onclick=e=>{
    e.stopPropagation();
    const copy=JSON.parse(JSON.stringify(piece));
    copy.id=uid();copy.label=piece.label+' (copie)';copy._deleted=false;
    const idx=p.pieces.indexOf(piece);
    p.pieces.splice(idx+1,0,copy);sv();showTab('diagnostic');toast('Pièce dupliquée ✓');
  };

  // Soft-delete / restaurer
  const delBtn=document.createElement('button');delBtn.className='del-b';
  if(piece._deleted){
    delBtn.style.cssText='color:var(--ok);border-color:#A7F3D0';
    delBtn.title='Restaurer';delBtn.textContent='↺';
  } else {
    delBtn.style.cssText='color:var(--danger);border-color:#FECACA';
    delBtn.title='Masquer / supprimer';delBtn.textContent='🗑';
  }
  delBtn.onclick=e=>{
    e.stopPropagation();
    piece._deleted=!piece._deleted;sv();showTab('diagnostic');
    toast(piece._deleted?'Pièce masquée — ↺ pour restaurer':'Pièce restaurée ✓');
  };

  toolbar.appendChild(renInp);toolbar.appendChild(dupBtn);toolbar.appendChild(delBtn);
  body.appendChild(toolbar);

  // Sous-sections depuis config
  getPSEC().forEach(sec=>{
    if(!sec||!sec.id||!Array.isArray(sec.fields))return;
    if(!piece.data)piece.data={};
    if(!piece.data[sec.id])piece.data[sec.id]={};
    const data=piece.data[sec.id];

    const psec=document.createElement('div');psec.className='psec';
    const psh=document.createElement('div');psh.className='psec-head';
    psh.innerHTML=`<span class="psh-icon">${sec.icon||'📋'}</span><span class="psh-title">${sec.title||''}</span><span class="ph-chev open" style="font-size:11px;color:#8899AA">▼</span>`;
    const psb=document.createElement('div');psb.className='psec-body open';

    const fields=sec.fields||[];
    let i=0;
    while(i<fields.length){
      const f=fields[i];
      if(!f||!f.id){i++;continue;}
      // Grouper les deux premiers champs number côte à côte
      const next=fields[i+1];
      if(f.type==='number'&&next&&next.type==='number'&&i<2){
        const row=document.createElement('div');row.className='pfield-row';
        [f,next].forEach(field=>{
          const pf=document.createElement('div');pf.className='pfield';
          const lf=document.createElement('label');lf.textContent=field.label||'';
          const inp=document.createElement('input');
          inp.type='number';inp.step=field.step||'0.01';
          inp.placeholder=field.placeholder||'0';inp.value=data[field.id]||'';
          inp.addEventListener('input',e=>{
            data[field.id]=e.target.value;sv();
            // Màj surface si les 2 premiers champs number
            const flds=fields.filter(x=>x.type==='number');
            if(flds.length>=2){
              const s=(parseFloat(data[flds[0].id])||0)*(parseFloat(data[flds[1].id])||0);
              if(s)head.querySelector('.ph-surf').textContent=s.toFixed(1)+' m²';
            }
          });
          pf.appendChild(lf);pf.appendChild(inp);row.appendChild(pf);
        });
        psb.appendChild(row);i+=2;continue;
      }
      // Champ standard
      const pf=document.createElement('div');pf.className='pfield';
      const lf=document.createElement('label');lf.textContent=f.label||'';
      let inp;
      if(f.type==='select'){
        inp=document.createElement('select');
        (f.opts||['',f.label||'']).forEach(o=>{
          const op=document.createElement('option');op.value=o;op.textContent=o||'—';
          if((data[f.id]||'')===o)op.selected=true;inp.appendChild(op);
        });
        inp.addEventListener('change',e=>{data[f.id]=e.target.value;sv();});
      } else if(f.type==='textarea'){
        inp=document.createElement('textarea');
        inp.placeholder=f.placeholder||'';inp.value=data[f.id]||'';
        inp.addEventListener('input',e=>{data[f.id]=e.target.value;sv();});
      } else {
        inp=document.createElement('input');inp.type=f.type||'text';
        if(f.step)inp.step=f.step;
        inp.placeholder=f.placeholder||'';inp.value=data[f.id]||'';
        inp.addEventListener('input',e=>{data[f.id]=e.target.value;sv();});
      }
      pf.appendChild(lf);pf.appendChild(inp);psb.appendChild(pf);i++;
    }

    psh.onclick=()=>{psb.classList.toggle('open');psh.querySelector('.ph-chev').classList.toggle('open');};
    psec.appendChild(psh);psec.appendChild(psb);body.appendChild(psec);
  });

  // Toggle header
  head.onclick=e=>{
    if(e.target===renInp||e.target===dupBtn||e.target===delBtn)return;
    if(piece._deleted)return;
    body.classList.toggle('open');head.querySelector('.ph-chev').classList.toggle('open');
  };
  block.appendChild(head);block.appendChild(body);
  return block;
}

    ['SSI / Alarme',ssi,'NF S 61-931'],

    ['WC PMR',pmr,'Arrêté 2017'],
    ['Porte accès','Largeur utile min. 0.90m','PMR'],
    ['AT ERP','<span class="tag tdanger">Obligatoire</span> avant travaux','L.111-8 CCH'],
    ['Commission sécu.',comm,'CCH'],

function renderPlan(c){
  const p=proj();
  c.style.cssText='display:flex;flex-direction:column;height:100%';

      dz.appendChild(rm);

  // Catégories

    const on=cat===planActiveCat;

    btn.style.cssText=`border-color:${on?meta.color:'#DDE6EE'};background:${on?meta.color:meta.light};color:${on?'#fff':meta.color}`;

    btn.onclick=()=>{planActiveCat=cat;planActiveEqId=null;refreshEqBar();};

  // Actions
  const acts=document.createElement('div');acts.className='plan-acts';acts.style.flexShrink='0';

  const zoBtn=document.createElement('button');zoBtn.className='pact';zoBtn.textContent='🔍−';
  zoBtn.onclick=()=>{planState.zoom=Math.max(0.2,planState.zoom/1.35);planDraw();};
  const zrBtn=document.createElement('button');zrBtn.className='pact';zrBtn.textContent='⊡';
  zrBtn.onclick=()=>{planFitToScreen();planDraw();};
  const rotBtn=document.createElement('button');rotBtn.className='pact';rotBtn.textContent='↻ 90°';
  rotBtn.onclick=()=>{planState.rot=(planState.rot+90)%360;planFitToScreen();planDraw();};

    const chgLabel=document.createElement('label');chgLabel.className='pact';

    const ci=document.createElement('input');ci.type='file';ci.accept='image/*';

  acts.appendChild(ziBtn);acts.appendChild(zoBtn);acts.appendChild(zrBtn);acts.appendChild(rotBtn);acts.appendChild(pngBtn);
  c.appendChild(acts);

  // Charger l'image et initialiser le canvas
  const img=new Image();
  img.onload=()=>{
    planState.img=img;
    planState.rot=planState.rot||0;
    planFitToScreen();
    planDraw();
    initCanvasEvents(canvas,wrap,plan);
  };
  img.src=plan.imgSrc;
}

function buildEqBar(bar){
  if(!bar){bar=document.getElementById('peqbar');if(!bar)return;}
  bar.innerHTML='';
  allEq().filter(e=>e.cat===planActiveCat).forEach(eq=>{
    const isSel=eq.id===planActiveEqId;
    const meta=CAT[eq.cat]||{};
    const btn=document.createElement('div');btn.className='peq'+(isSel?' sel':'');
    btn.style.cssText=`border-color:${isSel?meta.color:'#DDE6EE'};background:${isSel?meta.bg:'#fff'};${isSel?'border-width:2px':''}`;
    btn.innerHTML=`<div class="peq-em">${eq.emoji}</div><span class="peq-lb" style="color:${isSel?meta.color:'var(--ink)'}">${eq.label}</span>`;
    btn.onclick=()=>{
      planActiveEqId=eq.id;buildEqBar();updateHint();

function addMarkerAtCenter(eqId){
  const plan=curPlan();
  const scroll=document.getElementById('plan-scroll');
  const img=document.getElementById('plan-img');

  let x=50, y=45; // défaut

  if(scroll&&img&&img.naturalWidth){
    // Calculer la position centrale visible en tenant compte du zoom/offset/rotation
    const sr=scroll.getBoundingClientRect();
    const cx=sr.left+sr.width/2;
    const cy=sr.top+sr.height/2;
    // Centre visible = centre du scroll = position 50,50 dans l'espace transformé
    // On veut placer au centre de ce qui est visible
    // Sans offset : c'est 50%,50% de l'image
    // Avec offset : le centre visible est décalé
    const natW=sr.width/planZoom;
    const natH=img.naturalHeight/img.naturalWidth*natW;
    // Offset en % image
    const offXpct=-planOffsetX/planZoom/natW*100;
    const offYpct=-planOffsetY/planZoom/natH*100;
    x=Math.min(92,Math.max(8,50+offXpct));
    y=Math.min(92,Math.max(8,50+offYpct));
  }

  const mk={id:uid(),eqId,x,y,note:''};
  plan.markers.push(mk); sv();
  const cw=document.getElementById('plan-cw');
  if(cw) renderAllMk(cw,plan);
  toast('Marqueur ajouté — appui long pour déplacer / modifier / copier');
}

function exportPlanPNG(){
  const canvas=document.getElementById('plan-canvas');
  if(!canvas||!planState.img){alert('Aucun plan chargé.');return;}
  const plan=curPlan();const p=proj();
  // Créer un canvas haute résolution
  const sc=2;
  const offCanvas=document.createElement('canvas');
  offCanvas.width=canvas.width*sc;offCanvas.height=canvas.height*sc;
  const ctx=offCanvas.getContext('2d');
  ctx.scale(sc,sc);
  // Fond blanc
  ctx.fillStyle='#FFF';ctx.fillRect(0,0,canvas.width,canvas.height);
  // Dessiner plan
  ctx.save();
  ctx.translate(planState.panX,planState.panY);
  ctx.rotate(planState.rot*Math.PI/180);
  ctx.scale(planState.zoom,planState.zoom);
  const iw=planState.img.width,ih=planState.img.height;
  ctx.drawImage(planState.img,-iw/2,-ih/2,iw,ih);
  ctx.restore();
  // Dessiner marqueurs
  (plan.markers||[]).forEach(m=>{
    const eq=eqById(m.eqId);if(!eq)return;
    const meta=CAT[eq.cat]||{};
    const px=planPctToCanvas(m.x,m.y);
    drawMarker(ctx,px.x,px.y,eq,meta,false);
  });
  // Légende
  const ly=canvas.height-26;
  ctx.fillStyle='rgba(15,25,35,.82)';ctx.fillRect(0,ly,canvas.width,26);
  ctx.font='bold 10px Arial';ctx.fillStyle='#FFF';ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText(`Diag ERP · ${p.nom||'Projet'} · ${p.date||''} · ${plan.label} · ${plan.markers.length} marqueur(s)`,8,ly+13);
  offCanvas.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download=`plan_${p.nom||'erp'}_${plan.label}_${p.date||'visite'}.png`;
    a.click();URL.revokeObjectURL(url);toast('Plan exporté ✓');
  },'image/png');
}

function renderExport(c){
  const card=document.createElement('div');card.className='card';
  card.innerHTML=`<div style="padding:14px"><h3 style="font-size:14px;font-weight:700;color:var(--ink);margin-bottom:12px">Export CSV — logiciel de chiffrage</h3><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px"><button class="btn btn-p" onclick="genCSV()">Générer</button><button class="btn btn-s" onclick="copyCSV()">Copier</button><button class="btn btn-s" onclick="dlCSV()">Télécharger</button></div><div style="font-size:11px;color:#8899AA;margin-bottom:8px">Séparateur ; · UTF-8 · compatible Excel</div><textarea class="csv-pre" id="csv-out" readonly placeholder="Cliquez sur Générer…"></textarea></div>`;
  c.appendChild(card);c.style.paddingBottom='20px';
}
function buildCSV(){
  const p=proj(),eff=effectif(),cat=categorie(eff),{total,vente}=calcSurfs();
  const e=v=>'"'+String(v||'').replace(/"/g,'""')+'"';
  const L=['SEP=;'];
  [['Projet',p.nom],["Maître d'ouvrage",p.mo],['Adresse',p.adresse],['Date',p.date],
   ['MOE',p.moe],['Phase',p.phase],['Type ERP',p.activite],['Surface totale m²',total],
   ['Surface zone vente m²',vente],['Effectif ERP',eff],['Catégorie ERP',cat],['HSP m',p.hsp],
  ].forEach(([k,v])=>L.push([e(k),e(v)].join(';')));
  // Pièces
  L.push('');
  L.push(['PIÈCE','Section','Champ','Valeur'].map(e).join(';'));
  p.pieces.filter(x=>!x._deleted).forEach(piece=>{
    getPSEC().forEach(sec=>{
      const data=(piece.data&&piece.data[sec.id])||{};
      (sec.fields||[]).forEach(f=>{
        const v=data[f.id]||'';if(!v)return;
        L.push([e(piece.label),e(sec.title),e(f.label),e(v)].join(';'));
      });
    });
  });
  // Risques
  L.push('');
  L.push(['RISQUES','Observation','Coché'].map(e).join(';'));
  (p.risques||[]).forEach(r=>{if(!r.label&&!r.etat)return;L.push([e(r.label),e(r.etat),e(r.checked?'Oui':'Non')].join(';'));});
  // Plans
  (p.plans||[]).forEach(pl=>{
    if(!(pl.markers||[]).length)return;
    L.push('');
    L.push([`PLAN — ${pl.label}`,'Catégorie','Icône','Équipement','X %','Y %','Note'].map(e).join(';'));
    pl.markers.forEach(m=>{
      const eq=eqById(m.eqId)||{};
      L.push([e(pl.label),e((CAT[eq.cat]||{}).label),e(eq.emoji),e(eq.label),e(m.x?.toFixed(1)),e(m.y?.toFixed(1)),e(m.note)].join(';'));
    });
  });
  return L.join('\n');
}
function genCSV(){const csv=buildCSV();const el=document.getElementById('csv-out');if(el)el.value=csv;return csv;}
function copyCSV(){navigator.clipboard.writeText(genCSV()).then(()=>toast('Copié ✓'));}
function dlCSV(){
  const csv=genCSV(),p=proj();
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=`${p.nom||'diag'}_${p.date||'visite'}.csv`;
  a.click();URL.revokeObjectURL(url);toast('Téléchargé ✓');
}

// ══════════════════════════════════════════════════════
// ROTATION DU PLAN
// ══════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════
// MOTEUR PLAN — CANVAS 2D
// ══════════════════════════════════════════════════════
const planState={img:null,zoom:1,rot:0,panX:0,panY:0};
let repositionMode=false, repositionMarkerId=null;

function planFitToScreen(){
  const wrap=document.getElementById('plan-wrap');
  const canvas=document.getElementById('plan-canvas');
  if(!wrap||!canvas||!planState.img)return;
  const W=wrap.clientWidth||canvas.clientWidth||300;
  const H=wrap.clientHeight||canvas.clientHeight||400;
  canvas.width=W; canvas.height=H;
  const iw=planState.rot%180===0?planState.img.width:planState.img.height;
  const ih=planState.rot%180===0?planState.img.height:planState.img.width;
  planState.zoom=Math.min(W/iw, H/ih)*0.95;
  planState.panX=W/2;
  planState.panY=H/2;
}

function planDraw(){
  const canvas=document.getElementById('plan-canvas');
  const wrap=document.getElementById('plan-wrap');
  if(!canvas||!planState.img)return;
  const W=wrap?wrap.clientWidth:canvas.width;
  const H=wrap?wrap.clientHeight:canvas.height;
  if(canvas.width!==W||canvas.height!==H){canvas.width=W;canvas.height=H;}
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  ctx.save();
  // Translation au point de pan + rotation + scale
  ctx.translate(planState.panX, planState.panY);
  ctx.rotate(planState.rot*Math.PI/180);
  ctx.scale(planState.zoom, planState.zoom);
  // Dessiner l'image centrée
  const iw=planState.img.width, ih=planState.img.height;
  ctx.drawImage(planState.img,-iw/2,-ih/2,iw,ih);
  ctx.restore();

  // Dessiner les marqueurs
  const plan=curPlan();
  (plan.markers||[]).forEach(m=>{
    const eq=eqById(m.eqId);if(!eq)return;
    const meta=CAT[eq.cat]||{};
    // Convertir % → pixels canvas
    const px=planPctToCanvas(m.x,m.y);
    drawMarker(ctx,px.x,px.y,eq,meta,m.id===repositionMarkerId);
  });

  // Mode repositionnement : afficher une croix cible
  if(repositionMode){
    ctx.strokeStyle='rgba(0,102,204,0.6)';
    ctx.lineWidth=1;
    ctx.setLineDash([4,4]);
    for(let x=0;x<W;x+=60){{ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}}
    for(let y=0;y<H;y+=60){{ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}}
    ctx.setLineDash([]);
  }
}

function drawMarker(ctx,x,y,eq,meta,isActive){
  const r=22;
  // Ombre
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=8;ctx.shadowOffsetY=3;
  // Cercle fond
  ctx.beginPath();ctx.arc(x,y-r,r,0,Math.PI*2);
  ctx.fillStyle=meta.bg||'#EEE';ctx.fill();
  ctx.strokeStyle=isActive?'#0066CC':(meta.color||'#333');
  ctx.lineWidth=isActive?4:3;ctx.stroke();
  ctx.restore();
  // Emoji
  ctx.font=`${r}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(eq.emoji,x,y-r);
  // Pointe
  ctx.beginPath();ctx.moveTo(x-8,y-3);ctx.lineTo(x+8,y-3);ctx.lineTo(x,y+8);ctx.closePath();
  ctx.fillStyle=isActive?'#0066CC':(meta.color||'#333');ctx.fill();
  // Label
  if(eq.label){
    const fs=11;ctx.font=`bold ${fs}px Arial`;ctx.textAlign='center';
    const tw=ctx.measureText(eq.label).width+10;
    ctx.fillStyle='rgba(15,25,35,.85)';
    ctx.beginPath();if(ctx.roundRect)ctx.roundRect(x-tw/2,y+10,tw,16,3);else ctx.rect(x-tw/2,y+10,tw,16);ctx.fill();
    ctx.fillStyle='#fff';ctx.textBaseline='top';ctx.fillText(eq.label,x,y+12);
  }
}

// Conversion % image → pixels canvas
function planPctToCanvas(pctX,pctY){
  const img=planState.img;if(!img)return{x:0,y:0};
  // Position dans l'espace image centré (avant rotation)
  const ix=(pctX/100-0.5)*img.width;
  const iy=(pctY/100-0.5)*img.height;
  // Appliquer rotation
  const rad=planState.rot*Math.PI/180;
  const cos=Math.cos(rad),sin=Math.sin(rad);
  const rx=ix*cos-iy*sin;
  const ry=ix*sin+iy*cos;
  // Appliquer zoom et pan
  return{x:planState.panX+rx*planState.zoom, y:planState.panY+ry*planState.zoom};
}

// Conversion pixels canvas → % image
function canvasToPlanPct(cx,cy){
  const img=planState.img;if(!img)return{x:50,y:50};
  // Retirer pan
  let dx=cx-planState.panX;
  let dy=cy-planState.panY;
  // Retirer zoom
  dx/=planState.zoom;dy/=planState.zoom;
  // Retirer rotation
  const rad=-planState.rot*Math.PI/180;
  const cos=Math.cos(rad),sin=Math.sin(rad);
  const rx=dx*cos-dy*sin;
  const ry=dx*sin+dy*cos;
  // Convertir en %
  return{
    x:Math.min(97,Math.max(3,(rx/img.width+0.5)*100)),
    y:Math.min(97,Math.max(3,(ry/img.height+0.5)*100))
  };
}

// Trouver le marqueur sous un point canvas
function findMarkerAt(cx,cy,plan){
  const HIT=28; // rayon de détection en pixels canvas
  let best=null,bestDist=HIT*HIT;
  (plan.markers||[]).forEach(m=>{
    const p=planPctToCanvas(m.x,m.y);
    const d=(cx-p.x)**2+(cy-(p.y-22))**2;
    if(d<bestDist){bestDist=d;best=m;}
  });
  return best;
}

function initCanvasEvents(canvas,wrap,plan){
  let panning=false,pinching=false;
  let panSX=0,panSY=0,panSOX=0,panSOY=0;
  let pinchD0=0,pinchA0=0,pinchZ0=1,pinchR0=0;
  let longTimer=null,touchStartX=0,touchStartY=0,touchMoved=false;

  const tdist=(a,b)=>Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);
  const tangle=(a,b)=>Math.atan2(b.clientY-a.clientY,b.clientX-a.clientX)*180/Math.PI;
  const canvasXY=(clientX,clientY)=>{
    const r=canvas.getBoundingClientRect();
    return{x:(clientX-r.left)*(canvas.width/r.width),y:(clientY-r.top)*(canvas.height/r.height)};
  };

  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    const ts=e.touches;
    const pt=canvasXY(ts[0].clientX,ts[0].clientY);
    touchStartX=ts[0].clientX;touchStartY=ts[0].clientY;touchMoved=false;

    if(ts.length===1){
      // Mode repositionnement : tap = nouvelle position
      if(repositionMode){
        const pos=canvasToPlanPct(pt.x,pt.y);
        const m=plan.markers.find(x=>x.id===repositionMarkerId);
        if(m){m.x=pos.x;m.y=pos.y;sv();}
        exitRepositionMode();planDraw();
        toast('Position mise à jour ✓');
        setTimeout(()=>showTab('plan'),400);
        return;
      }
      panning=true;pinching=false;
      panSX=ts[0].clientX;panSY=ts[0].clientY;
      panSOX=planState.panX;panSOY=planState.panY;
      // Appui long = menu contextuel
      const mk=findMarkerAt(pt.x,pt.y,plan);
      if(mk){
        longTimer=setTimeout(()=>{
          if(!touchMoved){
            if(navigator.vibrate)navigator.vibrate(40);
            openMkContextMenu(mk,canvas,plan);
          }
        },500);
      }
    } else if(ts.length===2){
      panning=false;pinching=true;
      clearTimeout(longTimer);
      pinchD0=tdist(ts[0],ts[1]);
      pinchA0=tangle(ts[0],ts[1]);
      pinchZ0=planState.zoom;pinchR0=planState.rot;
    }
  },{passive:false});

  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    const ts=e.touches;
    const dx=ts[0].clientX-touchStartX,dy=ts[0].clientY-touchStartY;
    if(Math.abs(dx)>6||Math.abs(dy)>6){touchMoved=true;clearTimeout(longTimer);}
    if(ts.length===1&&panning&&!repositionMode){
      planState.panX=panSOX+(ts[0].clientX-panSX);
      planState.panY=panSOY+(ts[0].clientY-panSY);
      planDraw();
    } else if(ts.length===2&&pinching){
      const d=tdist(ts[0],ts[1]);
      const a=tangle(ts[0],ts[1]);
      planState.zoom=Math.min(8,Math.max(0.2,pinchZ0*(d/pinchD0)));
      planState.rot=pinchR0+(a-pinchA0);
      planDraw();
    }
  },{passive:false});

  canvas.addEventListener('touchend',e=>{
    e.preventDefault();
    clearTimeout(longTimer);
    if(e.touches.length===0){panning=false;pinching=false;}
  },{passive:false});

  // Souris
  let md=false,mmX=0,mmY=0,mmOX=0,mmOY=0,mmMoved=false;
  canvas.addEventListener('mousedown',e=>{
    const pt=canvasXY(e.clientX,e.clientY);
    if(repositionMode){
      const pos=canvasToPlanPct(pt.x,pt.y);
      const m=plan.markers.find(x=>x.id===repositionMarkerId);
      if(m){m.x=pos.x;m.y=pos.y;sv();}
      exitRepositionMode();planDraw();toast('Position mise à jour ✓');
      setTimeout(()=>showTab('plan'),400);return;
    }
    md=true;mmMoved=false;mmX=e.clientX;mmY=e.clientY;mmOX=planState.panX;mmOY=planState.panY;
    canvas.style.cursor='grabbing';
  });
  window.addEventListener('mousemove',e=>{
    if(!md)return;
    if(Math.abs(e.clientX-mmX)>3||Math.abs(e.clientY-mmY)>3)mmMoved=true;
    planState.panX=mmOX+(e.clientX-mmX);planState.panY=mmOY+(e.clientY-mmY);planDraw();
  });
  window.addEventListener('mouseup',e=>{
    if(!md)return;md=false;canvas.style.cursor='grab';
    if(!mmMoved){
      const pt=canvasXY(e.clientX,e.clientY);
      const mk=findMarkerAt(pt.x,pt.y,plan);
      if(mk)openMkContextMenu(mk,canvas,plan);
    }
  });
  canvas.addEventListener('wheel',e=>{
    e.preventDefault();
    planState.zoom=Math.min(8,Math.max(0.2,planState.zoom*(e.deltaY>0?0.9:1.1)));planDraw();
  },{passive:false});
}

function exitRepositionMode(){
  repositionMode=false;repositionMarkerId=null;
  const banner=document.getElementById('reposition-banner');
  if(banner)banner.classList.remove('show');
  const canvas=document.getElementById('plan-canvas');
  if(canvas)canvas.style.cursor='grab';
}

function addMarkerAtCenter(eqId){
  const plan=curPlan();
  const mk={id:uid(),eqId,x:50,y:45,note:''};
  plan.markers.push(mk);sv();planDraw();
  toast('Marqueur ajouté · Appui long pour options');
}

function openMkContextMenu(m,canvas,plan){
  document.querySelectorAll('.mk-ctx-menu').forEach(x=>x.remove());
  const eq=eqById(m.eqId)||{};
  const meta=CAT[eq.cat]||{};
  const menu=document.createElement('div');
  menu.className='mk-ctx-menu';
  menu.style.cssText='position:fixed;z-index:500;background:#fff;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.25);overflow:hidden;min-width:200px;animation:menuPop .15s ease-out';
  const ttl=document.createElement('div');
  ttl.style.cssText=`display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #EEF3F8;background:${meta.bg||'#F8FAFC'}`;
  ttl.innerHTML=`<span style="font-size:24px">${eq.emoji||'📍'}</span><span style="font-size:14px;font-weight:600;color:var(--ink)">${eq.label||''}</span>`;
  menu.appendChild(ttl);
  const items=[
    {icon:'✏️',label:'Modifier la note',action:()=>{closeCtxMenu(menu,null);openMkModal(m.id);}},
    {icon:'↔️',label:'Repositionner',action:()=>{
      closeCtxMenu(menu,null);
      repositionMode=true;repositionMarkerId=m.id;
      // Afficher le bandeau
      let banner=document.getElementById('reposition-banner');
      if(!banner){
        banner=document.createElement('div');banner.id='reposition-banner';
        banner.innerHTML=`<span>${eq.emoji} Tapez l'emplacement exact sur le plan</span><button id="cancel-repo" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer">Annuler</button>`;
        document.body.appendChild(banner);
      }
      banner.classList.add('show');
      document.getElementById('cancel-repo').onclick=()=>{exitRepositionMode();planDraw();};
      document.getElementById('cancel-repo').ontouchend=e=>{e.preventDefault();exitRepositionMode();planDraw();};
      if(canvas)canvas.style.cursor='crosshair';
      planDraw();
    }},
    {icon:'⎘',label:'Copier',action:()=>{
      closeCtxMenu(menu,null);
      const copy={id:uid(),eqId:m.eqId,x:Math.min(90,m.x+5),y:Math.min(90,m.y+5),note:m.note||''};
      plan.markers.push(copy);sv();planDraw();
      showTab('plan');toast('Copié ✓');
    }},
    {icon:'🗑',label:'Supprimer',action:()=>{
      closeCtxMenu(menu,null);
      plan.markers=plan.markers.filter(x=>x.id!==m.id);sv();planDraw();showTab('plan');
    },danger:true},
  ];
  items.forEach(item=>{
    const btn=document.createElement('button');
    btn.style.cssText=`display:flex;align-items:center;gap:12px;width:100%;padding:13px 16px;border:none;background:transparent;font-size:14px;font-family:inherit;cursor:pointer;color:${item.danger?'var(--danger)':'var(--ink)'}`;
    btn.innerHTML=`<span style="font-size:20px;width:28px;text-align:center">${item.icon}</span>${item.label}`;
    btn.onclick=item.action;btn.ontouchend=e=>{e.preventDefault();item.action();};
    menu.appendChild(btn);
  });
  document.body.appendChild(menu);
  // Positionner près du marqueur
  const px=planPctToCanvas(m.x,m.y);
  const cr=canvas.getBoundingClientRect();
  const scaleX=cr.width/canvas.width;
  const sx=cr.left+px.x*scaleX;
  const sy=cr.top+(px.y-22)*cr.height/canvas.height;
  const mw=menu.offsetWidth||200,mh=menu.offsetHeight||220;
  const vw=window.innerWidth,vh=window.innerHeight;
  let left=sx-mw/2,top=sy-mh-8;
  left=Math.max(8,Math.min(left,vw-mw-8));top=top<8?sy+30:top;
  menu.style.left=left+'px';menu.style.top=top+'px';
  setTimeout(()=>{
    const close=e=>{if(!menu.contains(e.target)){closeCtxMenu(menu,null);document.removeEventListener('touchstart',close);document.removeEventListener('mousedown',close);}};
    document.addEventListener('touchstart',close,{passive:true});document.addEventListener('mousedown',close);
  },100);
}

function closeCtxMenu(menu,pin){menu.remove();}
